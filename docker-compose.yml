version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: gomarg
      POSTGRES_PASSWORD: gomarg_password
      POSTGRES_DB: gomarg_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gomarg -d gomarg_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data:
